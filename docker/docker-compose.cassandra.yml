# Single-node Cassandra for practicing ds-collector locally (Docker mode).
# Local training Cassandra — see docs/03-local-lab.md.
services:
  cassandra:
    image: cassandra:5.0
    container_name: ds-collector-test-cassandra
    environment:
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
      CASSANDRA_CLUSTER_NAME: ds-collector-test
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q '^UN'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
